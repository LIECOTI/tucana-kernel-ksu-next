name: Build Tucana AOSP Kernel with KernelSU Next

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        repository: LineageOS/android_kernel_xiaomi_sm6150
        ref: lineage-23.2
        path: kernel_workspace

    - name: Setup Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libfl-dev curl wget git zip unzip ccache
        
    - name: Clone Proton Clang Toolchain
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang_toolchain

    - name: Integrate KernelSU Next Legacy
      run: |
        cd kernel_workspace
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

    - name: Compile Kernel
      run: |
        cd kernel_workspace
        
        export PATH="$GITHUB_WORKSPACE/clang_toolchain/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        export CC=clang
        export LD=ld.lld
        export AR=llvm-ar
        export NM=llvm-nm
        export OBJCOPY=llvm-objcopy
        export OBJDUMP=llvm-objdump
        export STRIP=llvm-strip
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

        make O=out vendor/sdmsteppe-perf_defconfig
        
        scripts/config --file out/.config -e MODULES
        scripts/config --file out/.config -e KALLSYMS
        scripts/config --file out/.config -e KALLSYMS_ALL
        scripts/config --file out/.config -e KPROBES
        scripts/config --file out/.config -e HAVE_KPROBES
        scripts/config --file out/.config -e KPROBE_EVENTS
        scripts/config --file out/.config -e KSU
        scripts/config --file out/.config -e KSU_KPROBE_HOOKS
        scripts/config --file out/.config -e OVERLAY_FS
        scripts/config --file out/.config -d LTO -d LTO_CLANG -d LTO_CLANG_THIN
        
        make O=out olddefconfig
        
        echo "=== DEBUG: CHECKING KCONFIG SURVIVAL ==="
        grep -E "CONFIG_MODULES|CONFIG_KPROBES|CONFIG_KSU" out/.config || echo "ERROR: CONFIGS WERE STRIPPED!"
        echo "=========================================="

        if ! make -j$(nproc --all) O=out ARCH=arm64 CC=clang \
             LLVM=1 LLVM_IAS=1 \
             LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy \
             OBJDUMP=llvm-objdump STRIP=llvm-strip \
             CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-; then
             
             echo "====================================================="
             echo "BUILD FAILED! RUNNING SINGLE THREAD TO CATCH ERROR..."
             echo "====================================================="
             
             make -j1 O=out ARCH=arm64 CC=clang \
                  LLVM=1 LLVM_IAS=1 \
                  LD=ld.lld AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy \
                  OBJDUMP=llvm-objdump STRIP=llvm-strip \
                  CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
             exit 1
        fi

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Tucana-Image-gz-dtb
        path: kernel_workspace/out/arch/arm64/boot/Image.gz-dtb
