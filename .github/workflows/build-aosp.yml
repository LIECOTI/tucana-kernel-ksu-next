name: Build Tucana AOSP Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Source
      uses: actions/checkout@v4
      with:
        repository: LineageOS/android_kernel_xiaomi_sm6150
        ref: lineage-23.2
        path: kernel_workspace

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libfl-dev curl wget git zip unzip ccache bison flex

    - name: Download Proton Clang
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang_toolchain

    - name: Integrate KernelSU Next (Legacy)
      run: |
        cd kernel_workspace
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

    - name: Backport path_umount
      run: |
        cd kernel_workspace
        cat << 'EOF' >> fs/namespace.c
        
        int path_umount(struct path *path, int flags)
        {
            struct mount *mnt = real_mount(path->mnt);
            int ret;
            down_write(&namespace_sem);
            ret = do_umount(mnt, flags);
            up_write(&namespace_sem);
            return ret;
        }
        EXPORT_SYMBOL(path_umount);
        EOF

    - name: Apply Compiler Fixes
      run: |
        cd kernel_workspace
        sed -i 's/-std=gnu89/-std=gnu89 -fcommon/g' Makefile
        find arch/arm64/boot/dts -name "Makefile" -exec sed -i 's/sa6155/sm6150/g' {} +

    - name: Configure Kconfig
      run: |
        cd kernel_workspace
        sed -i '/CONFIG_LTO/d; /CONFIG_CFI_CLANG/d' arch/arm64/configs/vendor/sdmsteppe-perf_defconfig
        
        cat <<EOF >> arch/arm64/configs/vendor/sdmsteppe-perf_defconfig
        CONFIG_MODULES=y
        CONFIG_KPROBES=y
        CONFIG_HAVE_KPROBES=y
        CONFIG_KPROBE_EVENTS=y
        CONFIG_KSU=y
        CONFIG_KSU_KPROBE_HOOKS=y
        CONFIG_OVERLAY_FS=y
        EOF
        
        export PATH="$GITHUB_WORKSPACE/clang_toolchain/bin:$PATH"
        make O=out ARCH=arm64 vendor/sdmsteppe-perf_defconfig
        make O=out ARCH=arm64 olddefconfig

    - name: Compile Core Kernel (vmlinux ONLY)
      run: |
        cd kernel_workspace
        export PATH="$GITHUB_WORKSPACE/clang_toolchain/bin:$PATH"
        
        make -j$(nproc --all) O=out ARCH=arm64 CC=clang \
             LLVM=1 LLVM_IAS=1 \
             CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
             CONFIG_KSU=y CONFIG_KSU_KPROBE_HOOKS=y CONFIG_KPROBES=y CONFIG_KPROBE_EVENTS=y CONFIG_MODULES=y \
             vmlinux || true
             
        if [ -f out/vmlinux ]; then
            echo "SUCCESS: vmlinux compiled perfectly! Ignoring DTB errors."
        else
            echo "FATAL: vmlinux was not found."
            exit 1
        fi

    - name: Extract Image and Compress (Bypass Makefile)
      run: |
        cd kernel_workspace
        export PATH="$GITHUB_WORKSPACE/clang_toolchain/bin:$PATH"
        mkdir -p output
        
        llvm-objcopy -O binary -R .note -R .note.gnu.build-id -R .comment -S out/vmlinux output/Image
        
        gzip -9 -c output/Image > output/Image.gz
        
        ls -la output/

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Tucana-Kernel-Output
        path: kernel_workspace/output/
