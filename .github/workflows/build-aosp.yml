name: Build Tucana AOSP Kernel with KernelSU Next

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Kernel Source
      uses: actions/checkout@v4
      with:
        repository: LineageOS/android_kernel_xiaomi_sm6150
        ref: lineage-23.2
        path: kernel_workspace

    - name: Setup Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential bc gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi libssl-dev libfl-dev curl wget git zip unzip ccache bison flex
        
    - name: Clone Proton Clang Toolchain
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git clang_toolchain

    - name: Integrate KernelSU Next Legacy
      run: |
        cd kernel_workspace
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

    - name: Backport path_umount to fs/namespace.c
      run: |
        cd kernel_workspace
        cat << 'EOF' >> fs/namespace.c
        
        int path_umount(struct path *path, int flags)
        {
            struct mount *mnt = real_mount(path->mnt);
            int ret;
            down_write(&namespace_sem);
            ret = do_umount(mnt, flags);
            up_write(&namespace_sem);
            return ret;
        }
        EXPORT_SYMBOL(path_umount);
        EOF

    - name: Compile Kernel
      run: |
        cd kernel_workspace
        
        sed -i 's/-std=gnu89/-std=gnu89 -fcommon/g' Makefile
        
        # PERL OBLITERATION OF BROKEN DTBs (Automotive and IoT)
        perl -pi -e 's/\S*sa6155\S*//g' arch/arm64/boot/dts/qcom/Makefile
        perl -pi -e 's/\S*sa8155\S*//g' arch/arm64/boot/dts/qcom/Makefile
        perl -pi -e 's/\S*qcs410\S*//g' arch/arm64/boot/dts/qcom/Makefile
        perl -pi -e 's/\S*qcs610\S*//g' arch/arm64/boot/dts/qcom/Makefile
        perl -pi -e 's/\S*prairie\S*//g' arch/arm64/boot/dts/qcom/Makefile
        
        export PATH="$GITHUB_WORKSPACE/clang_toolchain/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        
        sed -i 's/CONFIG_LTO=y/# CONFIG_LTO is not set/' arch/arm64/configs/vendor/sdmsteppe-perf_defconfig
        sed -i 's/CONFIG_LTO_CLANG=y/# CONFIG_LTO_CLANG is not set/' arch/arm64/configs/vendor/sdmsteppe-perf_defconfig
        sed -i 's/CONFIG_CFI_CLANG=y/# CONFIG_CFI_CLANG is not set/' arch/arm64/configs/vendor/sdmsteppe-perf_defconfig
        
        cat <<EOF >> arch/arm64/configs/vendor/sdmsteppe-perf_defconfig
        CONFIG_MODULES=y
        CONFIG_KPROBES=y
        CONFIG_HAVE_KPROBES=y
        CONFIG_KPROBE_EVENTS=y
        CONFIG_KSU=y
        CONFIG_KSU_KPROBE_HOOKS=y
        CONFIG_OVERLAY_FS=y
        EOF
        
        make O=out vendor/sdmsteppe-perf_defconfig
        make O=out olddefconfig

        if ! make -j$(nproc --all) O=out ARCH=arm64 CC=clang \
             LLVM=1 LLVM_IAS=1 \
             CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
             CONFIG_KSU=y CONFIG_KSU_KPROBE_HOOKS=y CONFIG_KPROBES=y CONFIG_KPROBE_EVENTS=y CONFIG_MODULES=y; then
             
             echo "====================================================="
             echo "MULTITHREADED BUILD FAILED!"
             echo "RUNNING FAST SINGLE THREAD TO REVEAL EXACT ERROR:"
             echo "====================================================="
             
             make -j1 O=out ARCH=arm64 CC=clang \
                  LLVM=1 LLVM_IAS=1 \
                  CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
                  CONFIG_KSU=y CONFIG_KSU_KPROBE_HOOKS=y CONFIG_KPROBES=y CONFIG_KPROBE_EVENTS=y CONFIG_MODULES=y
             exit 1
        fi

    - name: Upload Kernel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Tucana-Kernel-Boot-Folder
        path: kernel_workspace/out/arch/arm64/boot/Image*
